<p-toolbar styleClass="px-4 py-2 border-0 border-b border-surface">
  <ng-template #start>
    <div class="flex items-center gap-3">
      <span class="font-bold text-xl">Claude Monitor</span>
      <p-badge
        [value]="connectionStatus()"
        [severity]="statusColor()" />
    </div>
  </ng-template>

  <ng-template #end>
    <div class="flex items-center gap-3">
      @if (totalCost() > 0) {
        <p-tag [value]="formatCost(totalCost())" severity="info" />
      }
      @if (hasAwaitingApproval()) {
        <p-tag value="Approval needed" severity="warn" />
      }
      <div class="flex items-center gap-2">
        <i class="pi pi-sun"></i>
        <p-toggleswitch
          [(ngModel)]="isDarkMode"
          (onChange)="toggleDarkMode()" />
        <i class="pi pi-moon"></i>
      </div>
    </div>
  </ng-template>
</p-toolbar>
